name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ── Create the GitHub release with changelog notes ─────────────────────────
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Extract changelog section for this version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk "/^## \[${VERSION}\]/{found=1; next} /^## \[/{if(found) exit} found" CHANGELOG.md \
            | sed '/^[[:space:]]*$/d' \
            > /tmp/release-notes.md
          echo "--- release notes ---"
          cat /tmp/release-notes.md

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "РШР $GITHUB_REF_NAME" \
            --notes-file /tmp/release-notes.md

  # ── Web build: single-file HTML app ───────────────────────────────────────
  build-web:
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Package web app
        run: |
          FOLDER="master-of-schedule-web-${GITHUB_REF_NAME}"
          mkdir -p "$FOLDER"
          cp dist/index.html "$FOLDER/index.html"
          cp 'Прочитай!.txt' "$FOLDER/"
          zip -r "${FOLDER}.zip" "$FOLDER/"

      - name: Upload to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "$GITHUB_REF_NAME" "master-of-schedule-web-${GITHUB_REF_NAME}.zip" --clobber

  # ── macOS build: Tauri .dmg ────────────────────────────────────────────────
  build-macos:
    needs: create-release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - run: npm ci
      - run: npm run tauri:build

      - name: Upload to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "$GITHUB_REF_NAME" src-tauri/target/release/bundle/dmg/*.dmg --clobber

  # ── Rebuild website to update download links ──────────────────────────────
  rebuild-website:
    needs: [build-web, build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Trigger website rebuild
        run: |
          curl -s -o /dev/null -w "%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.WEBSITE_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/master-of-schedule/master-of-schedule.github.io/dispatches" \
            -d '{"event_type":"release"}'

  # ── Windows build: Tauri NSIS installer ───────────────────────────────────
  build-windows:
    needs: create-release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - run: npm ci
      - run: npm run tauri:build -- --bundles nsis

      - name: Upload to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: gh release upload "$GITHUB_REF_NAME" src-tauri/target/release/bundle/nsis/*.exe --clobber
