name: Release Workload

on:
  push:
    tags:
      - 'workload/v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. workload/v1.17.2)'
        required: true

permissions:
  contents: write

jobs:
  # ── Create the GitHub release with changelog notes ─────────────────────────
  create-release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.name }}
    steps:
      - uses: actions/checkout@v6

      - name: Resolve tag name
        id: tag
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          echo "name=$TAG" >> "$GITHUB_OUTPUT"

      - name: Extract changelog section for this version
        run: |
          VERSION="${{ steps.tag.outputs.name }}"
          VERSION="${VERSION#workload/v}"
          awk "/^## \[${VERSION}\]/{found=1; next} /^## \[/{if(found) exit} found" workload/CHANGELOG.md \
            | sed '/^[[:space:]]*$/d' \
            > /tmp/release-notes.md
          echo "--- release notes ---"
          cat /tmp/release-notes.md

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.name }}"
          gh release create "$TAG" \
            --title "РН $TAG" \
            --notes-file /tmp/release-notes.md

  # ── Web build: single-file HTML app ───────────────────────────────────────
  build-web:
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: workload/package-lock.json

      - run: npm ci --prefix workload
      - run: npm run build --prefix workload

      - name: Package web app
        run: |
          TAG="${{ needs.create-release.outputs.tag }}"
          VERSION="${TAG#workload/v}"
          FOLDER="master-of-workload-web-v${VERSION}"
          mkdir -p "$FOLDER"
          cp workload/dist/index.html "$FOLDER/index.html"
          cp 'Прочитай!.txt' "$FOLDER/"
          zip -r "${FOLDER}.zip" "$FOLDER/"

      - name: Upload to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.create-release.outputs.tag }}"
          VERSION="${TAG#workload/v}"
          gh release upload "$TAG" "master-of-workload-web-v${VERSION}.zip" --clobber

  # ── macOS desktop build (.dmg) ────────────────────────────────────────────
  build-macos:
    needs: create-release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: workload/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: workload/src-tauri -> target

      - run: npm ci --prefix workload

      - name: Build Tauri app (macOS)
        run: npm run tauri:build --prefix workload
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload .dmg to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.create-release.outputs.tag }}"
          DMG=$(find workload/src-tauri/target/release/bundle/dmg -name "*.dmg" | head -1)
          gh release upload "$TAG" "$DMG" --clobber

  # ── Windows desktop build (.exe installer) ───────────────────────────────
  build-windows:
    needs: create-release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: workload/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: workload/src-tauri -> target

      - run: npm ci --prefix workload

      - name: Build Tauri app (Windows)
        run: npm run tauri:build --prefix workload -- --bundles nsis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload NSIS installer to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${{ needs.create-release.outputs.tag }}"
          EXE=$(find workload/src-tauri/target/release/bundle/nsis -name "*.exe" | head -1)
          gh release upload "$TAG" "$EXE" --clobber

  # ── Rebuild website to update download links ──────────────────────────────
  rebuild-website:
    needs: [build-web, build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Trigger website rebuild
        run: |
          curl -s -o /dev/null -w "%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.WEBSITE_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/master-of-schedule/master-of-schedule.github.io/dispatches" \
            -d '{"event_type":"release"}'
