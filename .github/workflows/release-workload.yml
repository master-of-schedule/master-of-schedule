name: Release Workload

on:
  push:
    tags:
      - 'workload/v*'

permissions:
  contents: write

jobs:
  # ── Create the GitHub release with changelog notes ─────────────────────────
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Extract changelog section for this version
        run: |
          VERSION="${GITHUB_REF_NAME#workload/v}"
          awk "/^## \[${VERSION}\]/{found=1; next} /^## \[/{if(found) exit} found" workload/CHANGELOG.md \
            | sed '/^[[:space:]]*$/d' \
            > /tmp/release-notes.md
          echo "--- release notes ---"
          cat /tmp/release-notes.md

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "Редактор нагрузки $GITHUB_REF_NAME" \
            --notes-file /tmp/release-notes.md

  # ── Web build: single-file HTML app ───────────────────────────────────────
  build-web:
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: workload/package-lock.json

      - run: npm ci --prefix workload
      - run: npm run build --prefix workload

      - name: Package web app
        run: |
          VERSION="${GITHUB_REF_NAME#workload/v}"
          FOLDER="РН-web-v${VERSION}"
          mkdir -p "$FOLDER"
          cp workload/dist/index.html "$FOLDER/index.html"
          zip -r "${FOLDER}.zip" "$FOLDER/"

      - name: Upload to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#workload/v}"
          gh release upload "$GITHUB_REF_NAME" "РН-web-v${VERSION}.zip" --clobber

  # ── macOS desktop build (.dmg) ────────────────────────────────────────────
  build-macos:
    needs: create-release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: workload/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: workload/src-tauri -> target

      - run: npm ci --prefix workload

      - name: Build Tauri app (macOS)
        run: npm run tauri:build --prefix workload
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload .dmg to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DMG=$(find workload/src-tauri/target/release/bundle/dmg -name "*.dmg" | head -1)
          gh release upload "$GITHUB_REF_NAME" "$DMG" --clobber

  # ── Windows desktop build (.exe installer) ───────────────────────────────
  build-windows:
    needs: create-release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: workload/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: workload/src-tauri -> target

      - run: npm ci --prefix workload

      - name: Build Tauri app (Windows)
        run: npm run tauri:build --prefix workload -- --bundles nsis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload NSIS installer to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          EXE=$(find workload/src-tauri/target/release/bundle/nsis -name "*.exe" | head -1)
          gh release upload "$GITHUB_REF_NAME" "$EXE" --clobber
